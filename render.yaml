services:
  - type: web
    name: drp-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: APP_VERSION
        value: 0.1.0-testnet
    healthCheckPath: /health
